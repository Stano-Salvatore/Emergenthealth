name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "src/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".ci/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Initialize Android project
        run: |
          npx cap add android
          mkdir -p android/app/src/main/assets

      - name: Apply Android customizations
        run: python3 .ci/customize-android.py

      - name: Sync Capacitor
        run: |
          mkdir -p out
          NEXT_PUBLIC_APP_URL=https://emergenthealth.vercel.app npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
          grep -E "FAILED|error:|BUILD" /tmp/gradle.log | tail -20 || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emergenthealth-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
