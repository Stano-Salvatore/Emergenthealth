name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "src/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Initialize Android project
        run: |
          npx cap add android
          mkdir -p android/app/src/main/assets

      - name: Apply Android customizations
        run: |
          # Health Connect requires minSdkVersion >= 26
          sed -i 's/minSdkVersion = 24/minSdkVersion = 26/' android/variables.gradle

          # Add Health Connect + location + notification permissions to manifest
          python3 - <<'PYEOF'
          import re

          manifest_path = "android/app/src/main/AndroidManifest.xml"
          with open(manifest_path) as f:
              content = f.read()

          extra_permissions = """
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.health.READ_STEPS" />
              <uses-permission android:name="android.permission.health.READ_SLEEP" />
              <uses-permission android:name="android.permission.health.READ_HEART_RATE" />
              <uses-permission android:name="android.permission.health.READ_HEART_RATE_VARIABILITY" />
              <uses-permission android:name="android.permission.health.READ_OXYGEN_SATURATION" />
              <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED" />
              <uses-permission android:name="android.permission.health.READ_TOTAL_CALORIES_BURNED" />
              <uses-permission android:name="android.permission.health.READ_WEIGHT" />

              <queries>
                  <package android:name="com.google.android.apps.healthdata" />
                  <intent>
                      <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />
                  </intent>
              </queries>
          """

          # Insert before </manifest>
          content = content.replace("</manifest>", extra_permissions + "\n</manifest>")
          with open(manifest_path, "w") as f:
              f.write(content)

          print("Manifest updated successfully")
          PYEOF

      - name: Sync Capacitor
        run: npx cap sync android --no-build

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: emergenthealth-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
