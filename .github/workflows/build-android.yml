name: Build Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "src/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".ci/**"
      - ".github/workflows/build-android.yml"
      - "public/.well-known/assetlinks.json"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Initialize Android project
        run: |
          npx cap add android
          mkdir -p android/app/src/main/assets

      - name: Decode release keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/emergenthealth-release.jks
            echo "ANDROID_KEYSTORE_PATH=/tmp/emergenthealth-release.jks" >> $GITHUB_ENV
            echo "✓ Keystore decoded"
          else
            echo "ℹ️  No ANDROID_KEYSTORE_BASE64 secret — release APK will be unsigned"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Apply Android customizations
        run: python3 .ci/customize-android.py
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        shell: bash
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -o pipefail
          cd android && ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/gradle.log
          grep -E "FAILED|error:|BUILD" /tmp/gradle.log | tail -20 || true

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: emergenthealth-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 90
